<div class="auth-container">
    <div class="left-panel">
      <div class="content">
        <img src="assets/rocket-icon.png" alt="imagencita" class="icon" />
        <h2>Bienvenido de nuevo</h2>
        <p>Inicia sesión para continuar</p>
      </div>
    </div>
  
    <div class="right-panel">
      <div class="login-box">
        <h1 class="title">Iniciar Sesión</h1>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          
          <!-- Correo -->
          <div class="mb-4">
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" formControlName="email" required />
            <div *ngIf="hasErrors('email', 'required')" class="text-red-500 text-xs">
              El correo es obligatorio
            </div>
          </div>
  
          <!-- Contraseña -->
          <div class="mb-6">
            <label for="password">Contraseña:</label>
            <input type="password" id="password" formControlName="password" required />
            <div *ngIf="hasErrors('password', 'required')" class="text-red-500 text-xs">
              La contraseña es obligatoria
            </div>
            <div *ngIf="hasErrors('password', 'minlength')" class="text-red-500 text-xs">
              Mínimo 6 caracteres
            </div>
          </div>
  
          <!-- button-->
          <button type="submit" class="w-full btn-submit">Iniciar Sesión</button>
  
          <!-- registro -->
          <p class="switch">¿No tienes cuenta? <a href="/register">Regístrate aquí</a></p>
        </form>
      </div>
    </div>
  </div>
