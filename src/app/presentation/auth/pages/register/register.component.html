<div class="auth-container">
  <div class="left-panel flex justify-center items-center bg-gradient-to-r from-blue-500 to-blue-700 h-screen">
    <div class="content text-center text-white">
      <h1 class="text-4xl font-bold mb-4 text-shadow-lg">PLANTFLOW</h1>
      <img src="assets/authIcons/logoBig.svg" alt="imagencita" class="icon mb-6 mx-auto ml-6" />
      
      <h1 class="text-4xl font-bold mb-4 text-shadow-lg">Únete a nosotros</h1>
      
      <h2 class="text-2xl font-semibold mb-4 italic">Cultivamos tu futuro, ¡hoy!</h2>

      <p class="text-lg mb-6">Crea una cuenta para comenzar</p>
      
    </div>
  </div>
  
  
    <div class="right-panel">
      <div class="register-box">
        <h1 class="title">Registro</h1>
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
          
          <!-- name -->
          <div class="mb-4">
            <label for="firstName">Nombre:</label>
            <input type="text" id="firstName" formControlName="firstName" required />
            <div *ngIf="hasErrors('firstName', 'required')" class="text-red-500 text-xs">
              El nombre es obligatorio
            </div>
          </div>
  
          <!-- apellido -->
          <div class="mb-4">
            <label for="lastName">Apellido:</label>
            <input type="text" id="lastName" formControlName="lastName" required />
            <div *ngIf="hasErrors('lastName', 'required')" class="text-red-500 text-xs">
              El apellido es obligatorio
            </div>
          </div>
  
          <!-- email -->
          <div class="mb-4">
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" formControlName="email" required />
            <div *ngIf="hasErrors('email', 'required')" class="text-red-500 text-xs">
              El correo es obligatorio
            </div>
            <div *ngIf="hasErrors('email', 'email')" class="text-red-500 text-xs">
              Formato de correo inválido
            </div>
          </div>
  
          <!-- password -->
          <div class="mb-6">
            <label for="password">Contraseña:</label>
            <input type="password" id="password" formControlName="password" required />
            <div *ngIf="hasErrors('password', 'required')" class="text-red-500 text-xs">
              La contraseña es obligatoria
            </div>
            <div *ngIf="hasErrors('password', 'minlength')" class="text-red-500 text-xs">
              Mínimo 6 caracteres
            </div>
          </div>
  
          <!-- button  -->
          <button type="submit" class="w-full btn-submit">Registrarse</button>
  
          <!-- logi -->
          <p class="switch">¿Ya tienes cuenta? <a href="/login">Inicia sesión aquí</a></p>
        </form>
      </div>
    </div>
  </div>
